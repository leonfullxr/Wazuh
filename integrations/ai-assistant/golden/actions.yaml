# Golden cases for the V3.5 actions framework (propose → confirm).
# Bilingual set (V3.5d) — exercises HTTP surface directly, no LLM.
#
# assertion keys:
#   propose_status   expected HTTP status from POST /v1/actions/propose
#   confirm_status   expected HTTP status from POST .../confirm
#   result_ok        expected result.ok after confirm (true/false)
#   result_status    expected result.status string after confirm
#   dashboard_title  title substring verified after confirm
#   skip_confirm     if true, only test propose (e.g. reject flow)
#   reject_after_propose  call reject instead of confirm
#   confirm_user     Keycloak user override (default analyst1)
#   confirm_password password override
#   expect_operator  if false, confirm should 403 (analyst without operator role)

#   preview_any      substrings that must appear in proposal preview (casefold)
#   preview_min_panels minimum panel count mentioned in preview
#   skip_confirm     if true, stop after propose (preview-only cases)

cases:
  - id: brute-force-geoip-dashboard-en
    lang: en
    action: create_dashboard
    params:
      title: "Wazuh AI Brute Force GeoIP"
      template: brute_force_geoip
      description: "Golden eval — authentication failures with GeoIP triage"
    propose_status: 200
    confirm_status: 200
    result_ok: true
    result_status: created
    dashboard_title: "Wazuh AI Brute Force GeoIP"

  - id: brute-force-geoip-dashboard-es
    lang: es
    action: create_dashboard
    params:
      title: "Panel GeoIP fuerza bruta Wazuh AI"
      template: brute_force_geoip
      description: "Evaluacion golden — fallos de autenticacion con GeoIP"
    propose_status: 200
    confirm_status: 200
    result_ok: true
    result_status: created
    dashboard_title: "Panel GeoIP fuerza bruta Wazuh AI"

  - id: reject-proposal-en
    lang: en
    action: create_dashboard
    params:
      title: "Rejected dashboard proposal"
      template: auth_failures_top_users
    propose_status: 200
    reject_after_propose: true

  - id: confirm-requires-operator-es
    lang: es
    action: create_dashboard
    params:
      title: "Solo analista sin operador"
      template: auth_failures_top_users
    propose_status: 200
    confirm_status: 403
    confirm_user: analyst_no_op
    confirm_password: analyst_no_op
    expect_operator: false

  - id: brute-force-dashboard-preview-en
    lang: en
    action: create_dashboard
    params:
      title: "Brute force triage preview"
      template: brute_force_geoip
      description: "Golden eval — panel layout quality"
    propose_status: 200
    skip_confirm: true
    preview_min_panels: 4
    preview_any: ["metric", "timeline", "region_map", "GeoIP"]

  - id: custom-dashboard-propose-en
    lang: en
    action: create_dashboard
    params:
      title: "Custom SSH overview"
      template: custom
      panels:
        - title: "Failed logins"
          viz_type: metric
          query: "rule.groups: authentication_failed"
        - title: "Top users"
          viz_type: table
          terms_field: data.dstuser
          query: "rule.groups: authentication_failed"
    propose_status: 200
    skip_confirm: true
    preview_any: ["custom", "metric", "table"]
