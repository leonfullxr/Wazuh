# Minimal RHEL 8 Kickstart for Vagrant with CIS Partitions
lang en_US.UTF-8
keyboard us
timezone UTC
text
skipx
reboot

# Create vagrant user with password 'vagrant'
user --name=vagrant --plaintext --password=vagrant --groups=wheel
rootpw --plaintext vagrant

# Network setup
network --bootproto=dhcp

# CIS RHEL 8 Partition Layout
zerombr
clearpart --all --initlabel
reqpart
part /boot --fstype="xfs" --size=1024
part pv.01 --size=1 --grow
volgroup vg_os pv.01
logvol / --fstype="xfs" --name=lv_root --vgname=vg_os --size=10240
logvol /tmp --fstype="xfs" --name=lv_tmp --vgname=vg_os --size=2048 --fsoptions="nodev,nosuid,noexec"
logvol /var --fstype="xfs" --name=lv_var --vgname=vg_os --size=4096 --fsoptions="nodev,nosuid"
logvol /var/tmp --fstype="xfs" --name=lv_vartmp --vgname=vg_os --size=2048 --fsoptions="nodev,nosuid,noexec"
logvol /var/log --fstype="xfs" --name=lv_log --vgname=vg_os --size=2048 --fsoptions="nodev,nosuid,noexec"
logvol /var/log/audit --fstype="xfs" --name=lv_audit --vgname=vg_os --size=1024 --fsoptions="nodev,nosuid,noexec"
logvol /home --fstype="xfs" --name=lv_home --vgname=vg_os --size=2048 --fsoptions="nodev,nosuid"

%packages
@^minimal-environment
sudo
openssh-server
openssh-clients
curl
%end

%post --erroronfail
# Configure vagrant user for passwordless sudo (Required by Vagrant)
echo "vagrant ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers.d/vagrant
chmod 0440 /etc/sudoers.d/vagrant
%end
